<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>cYama AI - Asisten Cerdas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 15s infinite ease-in-out;
        }
        
        .glow-1 { background: #8b5cf6; top: -150px; left: -150px; animation-delay: 0s; }
        .glow-2 { background: #ec4899; bottom: -150px; right: -150px; animation-delay: -5s; }
        .glow-3 { background: #06b6d4; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -10s; width: 300px; height: 300px; }
        .glow-4 { background: #10b981; bottom: 20%; left: 10%; animation-delay: -7s; width: 250px; height: 250px; }
        
        @keyframes float {
            0%,100% { transform: translate(0,0) scale(1); opacity: 0.4; }
            33% { transform: translate(40px,-40px) scale(1.2); opacity: 0.6; }
            66% { transform: translate(-30px,30px) scale(0.8); opacity: 0.3; }
        }
        
        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            animation: particleFly 12s infinite linear;
        }
        
        @keyframes particleFly {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        /* Login Card */
        .login-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        
        .logo i { font-size: 48px; color: #4c1d95; }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #c7e9fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .tagline {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .google-btn {
            width: 100%;
            padding: 16px;
            background: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        
        .google-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        .guest-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .guest-btn:hover { background: rgba(255,255,255,0.2); }
        
        .features {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
            text-align: left;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
        
        .feature-item i { width: 20px; color: #8b5cf6; }
        
        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
            h1 { font-size: 28px; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
        <div class="glow glow-4"></div>
    </div>
    <div class="particles" id="particles"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo"><i class="fas fa-brain"></i></div>
            <h1>cYama AI</h1>
            <div class="tagline">Asisten Cerdas Berbasis GPT-4</div>
            
            <button class="google-btn" onclick="location.href='/api/auth/google'">
                <i class="fab fa-google"></i> Lanjut dengan Google
            </button>
            
            <button class="guest-btn" onclick="guestLogin()">
                Gunakan sebagai Tamu
            </button>
            
            <div class="features">
                <div class="feature-item"><i class="fas fa-check-circle"></i> Chat dengan GPT-4</div>
                <div class="feature-item"><i class="fas fa-check-circle"></i> Upload & Deskripsi Gambar</div>
                <div class="feature-item"><i class="fas fa-check-circle"></i> Multi Chat & History</div>
                <div class="feature-item"><i class="fas fa-check-circle"></i> Voice Input</div>
                <div class="feature-item"><i class="fas fa-check-circle"></i> AI Personality</div>
                <div class="feature-item"><i class="fas fa-check-circle"></i> Dark Mode</div>
            </div>
        </div>
    </div>
    
    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for(let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.width = Math.random() * 5 + 1 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = Math.random() * 10 + 8 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
        
        function guestLogin() {
            localStorage.setItem('cyama_auth', 'guest');
            localStorage.setItem('cyama_user', JSON.stringify({ name: 'Tamu' }));
            location.href = '/dashboard.html';
        }
        
        if (localStorage.getItem('cyama_auth') === 'true') {
            location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
