<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cYama AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;justify-content:center;align-items:center}
        .container{background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);border-radius:30px;padding:50px;text-align:center;max-width:450px;width:90%;box-shadow:0 25px 45px rgba(0,0,0,0.3)}
        .logo{font-size:80px;margin-bottom:20px}
        h1{color:white;font-size:36px;margin-bottom:10px}
        p{color:rgba(255,255,255,0.7);margin-bottom:30px}
        .google-btn{background:white;color:#333;border:none;padding:15px;border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:12px;transition:all 0.3s}
        .google-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,0,0,0.2)}
        .guest-btn{background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.3);padding:12px;border-radius:50px;font-size:14px;cursor:pointer;margin-top:15px;width:100%}
        .guest-btn:hover{background:rgba(255,255,255,0.3)}
        .features{margin-top:30px;text-align:left;color:rgba(255,255,255,0.6);font-size:13px}
        .features li{margin:8px 0;list-style:none}
        .error{background:rgba(239,68,68,0.2);color:#fca5a5;padding:10px;border-radius:10px;margin-bottom:20px}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><i class="fas fa-brain"></i></div>
        <h1>cYama AI</h1>
        <p>Asisten Cerdas Berbasis GPT-4</p>
        <div id="errorMsg" class="error" style="display:none"></div>
        <button class="google-btn" onclick="location.href='/api/auth/google'"><i class="fab fa-google"></i> Login dengan Google</button>
        <button class="guest-btn" onclick="guestLogin()">Lanjut sebagai Tamu</button>
        <div class="features"><li>✅ Login → Chat tersimpan & multi chat</li><li>✅ Tamu → 1 obrolan, tidak tersimpan</li><li>✅ Bisa buat, hapus, dan ganti obrolan</li></div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            document.getElementById('errorMsg').textContent = '❌ ' + decodeURIComponent(error);
            document.getElementById('errorMsg').style.display = 'block';
        }
        if (localStorage.getItem('cyama_auth') === 'true') {
            window.location.href = '/dashboard.html';
        }
        function guestLogin() {
            localStorage.setItem('cyama_auth', 'guest');
            localStorage.setItem('cyama_user', JSON.stringify({ name: 'Tamu', isGuest: true }));
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
