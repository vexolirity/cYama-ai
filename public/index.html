<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>cYama AI - Premium AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 30%, #0f0c29, #1a1a3e, #0a0a1a);
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated gradient background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 25s infinite ease-in-out;
        }
        
        .orb-1 { width: 500px; height: 500px; background: #8b5cf6; top: -200px; left: -200px; opacity: 0.4; }
        .orb-2 { width: 400px; height: 400px; background: #ec4899; bottom: -150px; right: -150px; opacity: 0.3; animation-delay: -8s; }
        .orb-3 { width: 350px; height: 350px; background: #06b6d4; top: 40%; left: 30%; opacity: 0.25; animation-delay: -15s; }
        .orb-4 { width: 300px; height: 300px; background: #10b981; bottom: 20%; left: 10%; opacity: 0.2; animation-delay: -5s; }
        
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(60px, -60px) scale(1.1); }
            66% { transform: translate(-50px, 50px) scale(0.9); }
        }
        
        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: floatParticle 20s infinite linear;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        /* Main container */
        .login-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(15, 15, 35, 0.6);
            backdrop-filter: blur(25px);
            border-radius: 56px;
            padding: 52px 36px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(139,92,246,0.1);
            animation: slideUpFade 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .logo-wrapper {
            margin-bottom: 28px;
        }
        
        .logo-ring {
            width: 90px;
            height: 90px;
            margin: 0 auto;
            background: linear-gradient(135deg, #8b5cf6, #c084fc, #4c1d95);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulseGlow 3s infinite;
            box-shadow: 0 0 30px rgba(139,92,246,0.5);
        }
        
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(139,92,246,0.3); transform: scale(1); }
            50% { box-shadow: 0 0 50px rgba(139,92,246,0.7); transform: scale(1.02); }
        }
        
        .logo-ring i { font-size: 52px; color: white; }
        
        h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #c7e9fb, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        
        .badge {
            display: inline-block;
            background: rgba(139,92,246,0.2);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            color: #a78bfa;
            margin-bottom: 24px;
            border: 1px solid rgba(139,92,246,0.3);
        }
        
        .google-btn {
            width: 100%;
            padding: 18px;
            background: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 14px;
        }
        
        .google-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .google-btn:active { transform: translateY(0); }
        
        .guest-btn {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(139,92,246,0.4);
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .guest-btn:hover { background: rgba(139,92,246,0.2); border-color: #8b5cf6; }
        
        .divider {
            margin: 32px 0 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
        .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            text-align: left;
            margin-top: 8px;
        }
        
        .feature-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .feature-card i { font-size: 18px; color: #a78bfa; width: 28px; }
        .feature-card span { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500; }
        
        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; margin: 16px; }
            h1 { font-size: 36px; }
            .features-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>
    <div class="particles" id="particles"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-wrapper">
                <div class="logo-ring">
                    <i class="fas fa-brain"></i>
                </div>
            </div>
            <h1>cYama AI</h1>
            <div class="badge">✨ Powered by GPT-4</div>
            
            <button class="google-btn" id="googleLoginBtn">
                <i class="fab fa-google"></i> Lanjut dengan Google
            </button>
            
            <button class="guest-btn" id="guestLoginBtn">
                🎭 Gunakan sebagai Tamu
            </button>
            
            <div class="divider">
                <div class="divider-line"></div>
                <span>Fitur Premium</span>
                <div class="divider-line"></div>
            </div>
            
            <div class="features-grid">
                <div class="feature-card"><i class="fas fa-comments"></i><span>GPT-4 Chat</span></div>
                <div class="feature-card"><i class="fas fa-image"></i><span>Vision AI</span></div>
                <div class="feature-card"><i class="fas fa-microphone"></i><span>Voice Input</span></div>
                <div class="feature-card"><i class="fas fa-palette"></i><span>AI Personality</span></div>
                <div class="feature-card"><i class="fas fa-folder-tree"></i><span>Multi Chat</span></div>
                <div class="feature-card"><i class="fas fa-shield-alt"></i><span>Private Mode</span></div>
            </div>
        </div>
    </div>
    
    <script>
        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            for(let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.width = Math.random() * 6 + 2 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = Math.random() * 15 + 10 + 's';
                p.style.opacity = Math.random() * 0.5;
                container.appendChild(p);
            }
        }
        createParticles();
        
        function guestLogin() {
            localStorage.setItem('cyama_auth', 'guest');
            localStorage.setItem('cyama_user', JSON.stringify({ name: 'Tamu', picture: null }));
            window.location.href = '/dashboard';
        }
        
        document.getElementById('googleLoginBtn').onclick = () => {
            window.location.href = '/api/auth/google';
        };
        
        document.getElementById('guestLoginBtn').onclick = guestLogin;
        
        // Auto redirect if already logged in
        if (localStorage.getItem('cyama_auth') === 'true' || localStorage.getItem('cyama_auth') === 'guest') {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
