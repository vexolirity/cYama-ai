<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>cYama AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 64px; margin-bottom: 16px; }
        h1 { color: white; font-size: 28px; margin-bottom: 8px; }
        .sub { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 32px; }
        .google-btn {
            background: white; color: #1a1a2e; border: none;
            width: 100%; padding: 14px; border-radius: 60px;
            font-size: 16px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            gap: 12px; cursor: pointer; margin-bottom: 12px;
        }
        .guest-btn {
            background: rgba(255,255,255,0.1); color: white;
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%; padding: 14px; border-radius: 60px;
            font-size: 14px; cursor: pointer;
        }
        .features { margin-top: 32px; text-align: left; color: rgba(255,255,255,0.5); font-size: 12px; }
        .features li { margin: 8px 0; list-style: none; display: flex; align-items: center; gap: 8px; }
        .features i { width: 20px; font-size: 12px; color: #8b5cf6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><i class="fas fa-brain"></i></div>
        <h1>cYama AI</h1>
        <div class="sub">Asisten cerdas berbasis GPT-4</div>
        <button class="google-btn" onclick="location.href='/api/auth/google'"><i class="fab fa-google"></i> Login dengan Google</button>
        <button class="guest-btn" onclick="guestLogin()">Lanjut sebagai Tamu</button>
        <div class="features">
            <li><i class="fas fa-check-circle"></i> Chat GPT-4 + Vision (lihat gambar)</li>
            <li><i class="fas fa-check-circle"></i> Multi chat, folder, pin, search</li>
            <li><i class="fas fa-check-circle"></i> Voice input + AI bisa bicara</li>
            <li><i class="fas fa-check-circle"></i> Reminder, incognito, export chat</li>
            <li><i class="fas fa-check-circle"></i> Dark/light mode ikuti HP</li>
        </div>
    </div>
    <script>
        function guestLogin() {
            localStorage.setItem('cyama_auth', 'guest');
            localStorage.setItem('cyama_user', JSON.stringify({ name: 'Tamu' }));
            location.href = '/dashboard.html';
        }
        if (localStorage.getItem('cyama_auth') === 'true') location.href = '/dashboard.html';
    </script>
</body>
</html>
