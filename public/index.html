<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>cYama AI - Asisten Cerdas Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ========== ANIMASI LATAR BERGERAK ========== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #8b5cf6, #4c1d95);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #ec4899, #be185d);
            bottom: -200px;
            right: -200px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #06b6d4, #0891b2);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        .orb-4 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #10b981, #047857);
            top: 20%;
            right: 10%;
            animation-delay: -15s;
        }

        .orb-5 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #f59e0b, #d97706);
            bottom: 10%;
            left: 5%;
            animation-delay: -7s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* ========== PARTIKEL BERGERAK ========== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ========== MAIN CONTAINER ========== */
        .app-container {
            position: relative;
            z-index: 2;
            display: flex;
            height: 100vh;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #4c1d95;
        }

        .logo-text h2 {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }

        .logo-text p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .new-chat-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .chat-item {
            padding: 12px;
            margin: 5px 0;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-item.active {
            background: rgba(139, 92, 246, 0.5);
        }

        .chat-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }

        .delete-chat {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 5px;
            display: none;
            transition: color 0.2s;
        }

        .delete-chat:hover {
            color: #ef4444;
        }

        .chat-item:hover .delete-chat {
            display: block;
        }

        /* ========== MAIN CHAT AREA ========== */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header dengan tombol login di pojok kanan atas */
        .chat-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .current-chat-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        /* USER MENU - POJOK KANAN ATAS */
        .user-menu {
            position: relative;
        }

        .user-avatar-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .user-avatar-btn:hover {
            transform: scale(1.05);
            border-color: #8b5cf6;
        }

        .user-avatar-btn img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-dropdown {
            position: absolute;
            top: 55px;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px;
            min-width: 220px;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .user-dropdown.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 12px;
        }

        .dropdown-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #6d28d9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dropdown-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .dropdown-avatar i {
            font-size: 20px;
            color: white;
        }

        .dropdown-name {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .dropdown-email {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .dropdown-btn {
            width: 100%;
            padding: 10px;
            background: rgba(139, 92, 246, 0.2);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .dropdown-btn:hover {
            background: rgba(139, 92, 246, 0.4);
        }

        .guest-mode-badge {
            background: rgba(16, 185, 129, 0.2);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            order: 2;
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .message-content {
            max-width: 70%;
        }

        .message.user .message-content {
            order: 1;
        }

        .message-bubble {
            padding: 12px 20px;
            border-radius: 20px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.bot .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            padding: 0 10px;
        }

        /* Input Area */
        .chat-input-area {
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            resize: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.15);
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .send-button {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .send-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: white;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
        }

        .feature-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            width: 200px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .feature-card i {
            font-size: 40px;
            color: #8b5cf6;
            margin-bottom: 10px;
        }

        .feature-card h4 {
            margin-bottom: 8px;
        }

        .feature-card p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -300px;
                z-index: 100;
                height: 100%;
                background: rgba(0, 0, 0, 0.95);
                width: 280px;
            }
            .sidebar.open {
                left: 0;
            }
            .menu-toggle {
                display: block;
            }
            .message-content {
                max-width: 85%;
            }
            .feature-grid {
                flex-direction: column;
                align-items: center;
            }
            .welcome-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Animasi Latar -->
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
        <div class="gradient-orb orb-4"></div>
        <div class="gradient-orb orb-5"></div>
    </div>
    <div class="particles" id="particles"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="logo-text">
                        <h2>cYama AI</h2>
                        <p>Powered by GPT-4</p>
                    </div>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i> Obrolan Baru
                </button>
            </div>
            <div class="chats-list" id="chatsList"></div>
            <div class="sidebar-footer" id="sidebarFooter"></div>
        </div>

        <!-- Main Chat -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="current-chat-title" id="currentChatTitle">cYama AI</div>
                </div>
                <div class="user-menu" id="userMenu">
                    <div class="user-avatar-btn" id="userAvatarBtn">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-dropdown" id="userDropdown">
                        <!-- Isi dari JS -->
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="welcome-title">cYama AI</div>
                    <div class="welcome-subtitle">Asisten Cerdas Berbasis GPT-4</div>
                    <div class="feature-grid">
                        <div class="feature-card">
                            <i class="fas fa-comments"></i>
                            <h4>Multi Chat</h4>
                            <p>Login untuk buat banyak obrolan</p>
                        </div>
                        <div class="feature-card">
                            <i class="fas fa-history"></i>
                            <h4>History Tersimpan</h4>
                            <p>Chat tidak hilang</p>
                        </div>
                        <div class="feature-card">
                            <i class="fas fa-bolt"></i>
                            <h4>Respons Cepat</h4>
                            <p>Powered by GPT-4</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea class="chat-input" id="messageInput" placeholder="Ketik pesan... (Enter untuk kirim)" rows="1"></textarea>
                    <button class="send-button" id="sendButton">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ PARTIKEL ============
        function createParticles() {
            const particlesDiv = document.getElementById('particles');
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 4 + 1;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 15}s`;
                particle.style.animationDuration = `${Math.random() * 10 + 8}s`;
                particlesDiv.appendChild(particle);
            }
        }
        createParticles();

        // ============ DATA & STATE ============
        let currentUser = null;
        let isGuest = true;
        let currentChatId = null;
        let chats = {};
        let isTyping = false;

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const userAvatarBtn = document.getElementById('userAvatarBtn');
        const userDropdown = document.getElementById('userDropdown');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatsList = document.getElementById('chatsList');
        const chatMessagesDiv = document.getElementById('chatMessages');
        const currentChatTitleSpan = document.getElementById('currentChatTitle');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        // ============ HELPER ============
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }

        // ============ AUTH CHECK ============
        function checkAuth() {
            const auth = localStorage.getItem('cyama_auth');
            const userData = localStorage.getItem('cyama_user');
            
            if (auth === 'true' && userData) {
                isGuest = false;
                currentUser = JSON.parse(userData);
            } else {
                isGuest = true;
                currentUser = { name: 'Tamu', isGuest: true };
            }
            
            updateUserUI();
            loadChats();
        }

        // ============ UI USER ============
        function updateUserUI() {
            const avatarBtn = document.getElementById('userAvatarBtn');
            if (!isGuest && currentUser?.picture) {
                avatarBtn.innerHTML = `<img src="${currentUser.picture}" alt="Avatar">`;
            } else {
                avatarBtn.innerHTML = '<i class="fas fa-user"></i>';
            }
            
            // Update new chat button (disabled untuk guest)
            newChatBtn.disabled = isGuest;
            if (isGuest) {
                newChatBtn.title = "Login untuk membuat obrolan baru";
            } else {
                newChatBtn.title = "Buat obrolan baru";
            }
            
            renderDropdown();
        }

        function renderDropdown() {
            if (isGuest) {
                userDropdown.innerHTML = `
                    <div class="guest-mode-badge">
                        <i class="fas fa-eye"></i> Mode Tamu
                    </div>
                    <button class="dropdown-btn" onclick="loginWithGoogle()" style="margin-top: 10px;">
                        <i class="fab fa-google"></i> Login dengan Google
                    </button>
                `;
            } else {
                userDropdown.innerHTML = `
                    <div class="dropdown-user-info">
                        <div class="dropdown-avatar">
                            ${currentUser?.picture ? `<img src="${currentUser.picture}" alt="">` : '<i class="fas fa-user"></i>'}
                        </div>
                        <div>
                            <div class="dropdown-name">${escapeHtml(currentUser?.name || 'User')}</div>
                            <div class="dropdown-email">${escapeHtml(currentUser?.email || '')}</div>
                        </div>
                    </div>
                    <button class="dropdown-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                `;
            }
        }

        function loginWithGoogle() {
            window.location.href = '/api/auth/google';
        }

        function logout() {
            localStorage.removeItem('cyama_auth');
            localStorage.removeItem('cyama_user');
            window.location.reload();
        }

        // ============ CHAT STORAGE ============
        function getStorageKey() {
            if (isGuest) return 'cyama_chats_guest';
            return `cyama_chats_${currentUser?.email || 'user'}`;
        }

        function saveChats() {
            localStorage.setItem(getStorageKey(), JSON.stringify(chats));
        }

        function loadChats() {
            const stored = localStorage.getItem(getStorageKey());
            if (stored) {
                chats = JSON.parse(stored);
            } else {
                chats = {};
            }
            
            if (Object.keys(chats).length === 0) {
                // For guest, create only 1 chat automatically
                createNewChat(true); // silent create
            } else {
                const firstChatId = Object.keys(chats)[0];
                selectChat(firstChatId);
            }
            renderChatsList();
        }

        function createNewChat(silent = false) {
            // Guest tidak bisa buat chat baru
            if (isGuest) {
                if (!silent) {
                    alert('Login dulu untuk membuat obrolan baru!');
                }
                return null;
            }
            
            const chatId = Date.now().toString();
            chats[chatId] = {
                id: chatId,
                title: 'Obrolan Baru',
                messages: [],
                createdAt: new Date().toISOString()
            };
            saveChats();
            renderChatsList();
            selectChat(chatId);
            return chatId;
        }

        function deleteChat(chatId) {
            if (isGuest) {
                alert('Login dulu untuk menghapus obrolan!');
                return;
            }
            
            if (confirm('Hapus obrolan ini?')) {
                delete chats[chatId];
                saveChats();
                const remainingChats = Object.keys(chats);
                if (remainingChats.length === 0) {
                    createNewChat();
                } else {
                    selectChat(remainingChats[0]);
                }
                renderChatsList();
            }
            event.stopPropagation();
        }

        function selectChat(chatId) {
            currentChatId = chatId;
            const chat = chats[chatId];
            if (chat) {
                currentChatTitleSpan.innerText = chat.title;
                renderMessages(chat.messages);
                renderChatsList();
            }
        }

        function updateChatTitle(chatId, firstMessage) {
            const title = firstMessage.substring(0, 30) + (firstMessage.length > 30 ? '...' : '');
            if (chats[chatId]) {
                chats[chatId].title = title;
                saveChats();
                renderChatsList();
                if (currentChatId === chatId) {
                    currentChatTitleSpan.innerText = title;
                }
            }
        }

        function renderChatsList() {
            chatsList.innerHTML = '';
            
            const sortedChats = Object.values(chats).sort((a, b) => 
                new Date(b.createdAt) - new Date(a.createdAt)
            );
            
            sortedChats.forEach(chat => {
                const chatDiv = document.createElement('div');
                chatDiv.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
                chatDiv.innerHTML = `
                    <div class="chat-title">${escapeHtml(chat.title)}</div>
                    ${!isGuest ? `<button class="delete-chat" onclick="deleteChat('${chat.id}')"><i class="fas fa-trash"></i></button>` : ''}
                `;
                chatDiv.onclick = (e) => {
                    if (e.target.closest('.delete-chat')) return;
                    selectChat(chat.id);
                };
                chatsList.appendChild(chatDiv);
            });
            
            // Jika guest dan tidak ada chat, buat 1
            if (isGuest && Object.keys(chats).length === 0) {
                const defaultId = 'guest_default';
                chats[defaultId] = {
                    id: defaultId,
                    title: 'Chat Tamu',
                    messages: [],
                    createdAt: new Date().toISOString()
                };
                saveChats();
                selectChat(defaultId);
                renderChatsList();
            }
        }

        function renderMessages(messages) {
            chatMessagesDiv.innerHTML = '';
            
            if (!messages || messages.length === 0) {
                chatMessagesDiv.innerHTML = `
                    <div class="welcome-screen">
                        <div class="welcome-icon">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="welcome-title">cYama AI</div>
                        <div class="welcome-subtitle">Ada yang bisa saya bantu hari ini?</div>
                        <div class="feature-grid">
                            <div class="feature-card">
                                <i class="fas fa-comments"></i>
                                <h4>Multi Chat</h4>
                                <p>${isGuest ? 'Login untuk buat banyak obrolan' : 'Banyak obrolan dalam 1 akun'}</p>
                            </div>
                            <div class="feature-card">
                                <i class="fas fa-history"></i>
                                <h4>History Tersimpan</h4>
                                <p>${isGuest ? 'Login agar chat tersimpan' : 'Chat tidak akan hilang'}</p>
                            </div>
                            <div class="feature-card">
                                <i class="fas fa-bolt"></i>
                                <h4>Respons Cepat</h4>
                                <p>Powered by GPT-4</p>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role}`;
                messageDiv.innerHTML = `
                    <div class="message-avatar"><i class="fas ${msg.role === 'user' ? 'fa-user' : 'fa-robot'}"></i></div>
                    <div class="message-content">
                        <div class="message-bubble">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${msg.time || ''}</div>
                    </div>
                `;
                chatMessagesDiv.appendChild(messageDiv);
            });
            scrollToBottom();
        }

        function addMessageToCurrentChat(role, content) {
            const chat = chats[currentChatId];
            if (!chat) return;
            
            chat.messages.push({
                role: role,
                content: content,
                time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
            });
            
            if (role === 'user' && chat.messages.length === 1) {
                updateChatTitle(currentChatId, content);
            }
            
            saveChats();
            renderMessages(chat.messages);
        }

        // ============ API CALL ============
        async function sendMessageToAPI(message) {
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                if (data.success) return data.reply;
                return `⚠️ Error: ${data.error || 'Terjadi kesalahan'}`;
            } catch (error) {
                return `⚠️ Error: ${error.message}`;
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isTyping) return;
            
            addMessageToCurrentChat('user', message);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            showTypingIndicator();
            isTyping = true;
            sendButton.disabled = true;
            
            const reply = await sendMessageToAPI(message);
            
            removeTypingIndicator();
            addMessageToCurrentChat('bot', reply);
            isTyping = false;
            sendButton.disabled = false;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message bot';
            typingDiv.innerHTML = `
                <div class="message-avatar"><i class="fas fa-robot"></i></div>
                <div class="message-content">
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>
            `;
            chatMessagesDiv.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ============ EVENT LISTENERS ============
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        userAvatarBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            userDropdown.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!userAvatarBtn.contains(e.target) && !userDropdown.contains(e.target)) {
                userDropdown.classList.remove('show');
            }
            // Close sidebar on mobile when clicking outside
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });

        newChatBtn.addEventListener('click', () => createNewChat());

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        // ============ INIT ============
        checkAuth();
        messageInput.focus();
    </script>
</body>
</html>
