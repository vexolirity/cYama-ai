<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cYama AI - GPT4</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        .chat-header {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.9), rgba(79, 70, 229, 0.9));
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #4c1d95;
        }

        .title h1 {
            color: white;
            font-size: 28px;
        }

        .title p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            order: 2;
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .message-content { max-width: 70%; }
        .message.user .message-content { order: 1; }

        .message-bubble {
            padding: 12px 20px;
            border-radius: 20px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.bot .message-bubble {
            background: rgba(255,255,255,0.1);
            color: white;
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
            padding: 0 10px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid #ef4444;
            padding: 15px;
            border-radius: 10px;
            color: #fca5a5;
        }

        .chat-input-area {
            padding: 20px 30px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
        }

        .chat-input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            resize: none;
        }

        .chat-input:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .send-button {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%,60%,100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        @media (max-width: 768px) {
            .chat-header { padding: 15px; }
            .title h1 { font-size: 20px; }
            .chat-messages { padding: 15px; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-wrapper">
            <div class="chat-header">
                <div class="logo"><i class="fas fa-brain"></i></div>
                <div class="title">
                    <h1>cYama AI</h1>
                    <p>Powered by GPT-4</p>
                </div>
                <div class="status">
                    <div class="status-dot"></div>
                    <span>Online</span>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-content">
                        <div class="message-bubble">
                            Halo! Saya <strong>cYama AI</strong> berbasis GPT-4.<br>
                            Ada yang bisa saya bantu? 😊
                        </div>
                        <div class="message-time">Sekarang</div>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea class="chat-input" id="messageInput" placeholder="Ketik pesan... (Enter kirim)" rows="1"></textarea>
                    <button class="send-button" id="sendButton"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        
        let isTyping = false;

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `
                <div class="message-avatar"><i class="fas ${sender === 'user' ? 'fa-user' : 'fa-robot'}"></i></div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    <div class="message-time">${new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' })}</div>
                </div>
            `;
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function addError(text) {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `
                <div class="message-avatar"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="message-content">
                    <div class="error-message">⚠️ ${escapeHtml(text)}</div>
                    <div class="message-time">${new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' })}</div>
                </div>
            `;
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar"><i class="fas fa-robot"></i></div>
                <div class="message-content">
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isTyping) return;
            
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            showTyping();
            isTyping = true;
            sendButton.disabled = true;
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await res.json();
                removeTyping();
                
                if (data.success) {
                    addMessage(data.reply, 'bot');
                } else {
                    addError(data.error || 'Terjadi kesalahan');
                }
            } catch (error) {
                removeTyping();
                addError('Gagal terhubung ke server: ' + error.message);
            } finally {
                isTyping = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        sendButton.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        
        messageInput.focus();
    </script>
</body>
</html>
