<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cYama AI - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);height:100vh;overflow:hidden}
        .app{display:flex;height:100vh}
        .sidebar{width:280px;background:rgba(0,0,0,0.4);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column}
        .sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.1)}
        .new-btn{width:100%;padding:12px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);border:none;border-radius:30px;color:white;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
        .new-btn:hover{opacity:0.9}
        .chats-list{flex:1;overflow-y:auto;padding:10px}
        .chat-item{padding:12px;margin:5px 0;border-radius:12px;cursor:pointer;color:white;display:flex;justify-content:space-between;align-items:center}
        .chat-item:hover{background:rgba(255,255,255,0.1)}
        .chat-item.active{background:rgba(139,92,246,0.5)}
        .chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .delete-chat{background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;padding:5px;display:none}
        .chat-item:hover .delete-chat{display:block}
        .sidebar-footer{padding:20px;border-top:1px solid rgba(255,255,255,0.1)}
        .user-info{display:flex;align-items:center;gap:12px;color:white}
        .user-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#6d28d9;display:flex;align-items:center;justify-content:center}
        .user-name{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis}
        .logout-btn{background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:18px}
        .main-chat{flex:1;display:flex;flex-direction:column}
        .chat-header{padding:15px 25px;background:rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:15px}
        .menu-toggle{display:none;background:none;border:none;color:white;font-size:24px;cursor:pointer}
        .chat-title-header{color:white;font-size:18px;font-weight:600}
        .chat-messages{flex:1;overflow-y:auto;padding:30px;display:flex;flex-direction:column;gap:20px}
        .message{display:flex;gap:15px;animation:slideIn 0.3s ease}
        @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .message.user{justify-content:flex-end}
        .message-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
        .message.user .message-avatar{background:linear-gradient(135deg,#8b5cf6,#6d28d9);order:2}
        .message.bot .message-avatar{background:linear-gradient(135deg,#10b981,#059669)}
        .message-content{max-width:70%}
        .message.user .message-content{order:1}
        .message-bubble{padding:12px 20px;border-radius:20px;word-wrap:break-word;line-height:1.5}
        .message.user .message-bubble{background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:white;border-bottom-right-radius:5px}
        .message.bot .message-bubble{background:rgba(255,255,255,0.1);color:white;border-bottom-left-radius:5px}
        .message-time{font-size:11px;color:rgba(255,255,255,0.5);margin-top:5px;padding:0 10px}
        .chat-input-area{padding:20px 30px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.1)}
        .input-wrapper{display:flex;gap:15px}
        .chat-input{flex:1;padding:15px 20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:25px;color:white;font-size:15px;resize:none}
        .chat-input:focus{outline:none;border-color:#8b5cf6}
        .send-button{width:50px;height:50px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);border:none;border-radius:50%;color:white;cursor:pointer}
        .send-button:disabled{opacity:0.5;cursor:not-allowed}
        .typing-indicator{display:flex;gap:5px;padding:12px 20px;background:rgba(255,255,255,0.1);border-radius:20px;width:fit-content}
        .typing-indicator span{width:8px;height:8px;background:white;border-radius:50%;animation:typing 1.4s infinite}
        .typing-indicator span:nth-child(2){animation-delay:0.2s}
        .typing-indicator span:nth-child(3){animation-delay:0.4s}
        @keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.5}30%{transform:translateY(-10px);opacity:1}}
        @media(max-width:768px){.sidebar{position:fixed;left:-280px;z-index:100;height:100%;background:rgba(0,0,0,0.95)}.sidebar.open{left:0}.menu-toggle{display:block}.message-content{max-width:85%}}
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><button class="new-btn" onclick="createNewChat()"><i class="fas fa-plus"></i> Obrolan Baru</button></div>
        <div class="chats-list" id="chatsList"></div>
        <div class="sidebar-footer" id="sidebarFooter"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header"><button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button><div class="chat-title-header" id="currentChatTitle"></div></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area"><div class="input-wrapper"><textarea id="messageInput" class="chat-input" placeholder="Ketik pesan... (Enter kirim)" rows="1"></textarea><button class="send-button" id="sendButton"><i class="fas fa-paper-plane"></i></button></div></div>
    </div>
</div>
<script>
// CEK AUTH
const auth = localStorage.getItem('cyama_auth');
if (!auth || (auth !== 'true' && auth !== 'guest')) window.location.href = '/';
const isGuest = auth === 'guest';
const userData = JSON.parse(localStorage.getItem('cyama_user') || '{}');

// DATA
let currentChatId = null;
let chats = {};
let isTyping = false;

// STORAGE
function getStorageKey() {
    if (isGuest) return 'cyama_chats_guest';
    return `cyama_chats_${userData.email || 'user'}`;
}

function saveChats() {
    localStorage.setItem(getStorageKey(), JSON.stringify(chats));
}

function loadChats() {
    const stored = localStorage.getItem(getStorageKey());
    if (stored) chats = JSON.parse(stored);
    else chats = {};
    
    if (Object.keys(chats).length === 0) createNewChat();
    else selectChat(Object.keys(chats)[0]);
    renderChatsList();
}

function createNewChat() {
    const chatId = Date.now().toString();
    chats[chatId] = {
        id: chatId,
        title: 'Obrolan Baru',
        messages: [],
        createdAt: new Date().toISOString()
    };
    saveChats();
    renderChatsList();
    selectChat(chatId);
}

function deleteChat(chatId) {
    if (confirm('Hapus obrolan ini?')) {
        delete chats[chatId];
        saveChats();
        if (Object.keys(chats).length === 0) createNewChat();
        else selectChat(Object.keys(chats)[0]);
        renderChatsList();
    }
    event.stopPropagation();
}

function selectChat(chatId) {
    currentChatId = chatId;
    const chat = chats[chatId];
    document.getElementById('currentChatTitle').innerText = chat.title;
    renderMessages(chat.messages);
    renderChatsList();
}

function updateChatTitle(chatId, firstMessage) {
    const title = firstMessage.substring(0, 30) + (firstMessage.length > 30 ? '...' : '');
    if (chats[chatId]) {
        chats[chatId].title = title;
        saveChats();
        renderChatsList();
        if (currentChatId === chatId) {
            document.getElementById('currentChatTitle').innerText = title;
        }
    }
}

function renderChatsList() {
    const container = document.getElementById('chatsList');
    container.innerHTML = '';
    Object.values(chats).forEach(chat => {
        const chatDiv = document.createElement('div');
        chatDiv.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
        chatDiv.innerHTML = `
            <div class="chat-title">${escapeHtml(chat.title)}</div>
            <button class="delete-chat" onclick="deleteChat('${chat.id}')"><i class="fas fa-trash"></i></button>
        `;
        chatDiv.onclick = (e) => {
            if (e.target.closest('.delete-chat')) return;
            selectChat(chat.id);
        };
        container.appendChild(chatDiv);
    });
}

function renderMessages(messages) {
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    
    if (!messages || messages.length === 0) {
        container.innerHTML = '<div class="message bot"><div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content"><div class="message-bubble">Halo! Saya <strong>cYama AI</strong> berbasis GPT-4.<br>Ada yang bisa saya bantu? 😊</div></div></div>';
        return;
    }
    
    messages.forEach(msg => {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${msg.role}`;
        messageDiv.innerHTML = `
            <div class="message-avatar"><i class="fas ${msg.role === 'user' ? 'fa-user' : 'fa-robot'}"></i></div>
            <div class="message-content">
                <div class="message-bubble">${escapeHtml(msg.content)}</div>
                <div class="message-time">${msg.time || ''}</div>
            </div>
        `;
        container.appendChild(messageDiv);
    });
    scrollToBottom();
}

function addMessageToCurrentChat(role, content) {
    const chat = chats[currentChatId];
    if (!chat) return;
    
    chat.messages.push({
        role: role,
        content: content,
        time: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
    });
    
    if (role === 'user' && chat.messages.length === 1) {
        updateChatTitle(currentChatId, content);
    }
    
    saveChats();
    renderMessages(chat.messages);
}

// API CALL
async function sendMessageToAPI(message) {
    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });
        const data = await response.json();
        if (data.success) return data.reply;
        return `⚠️ Error: ${data.error || 'Terjadi kesalahan'}`;
    } catch (error) {
        return `⚠️ Error: ${error.message}`;
    }
}

// SEND MESSAGE
async function sendMessage() {
    const messageInput = document.getElementById('messageInput');
    const message = messageInput.value.trim();
    if (!message || isTyping) return;
    
    addMessageToCurrentChat('user', message);
    messageInput.value = '';
    messageInput.style.height = 'auto';
    
    showTypingIndicator();
    isTyping = true;
    document.getElementById('sendButton').disabled = true;
    
    const reply = await sendMessageToAPI(message);
    
    removeTypingIndicator();
    addMessageToCurrentChat('bot', reply);
    isTyping = false;
    document.getElementById('sendButton').disabled = false;
}

function showTypingIndicator() {
    const container = document.getElementById('chatMessages');
    const typingDiv = document.createElement('div');
    typingDiv.id = 'typingIndicator';
    typingDiv.className = 'message bot';
    typingDiv.innerHTML = '<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
    container.appendChild(typingDiv);
    scrollToBottom();
}

function removeTypingIndicator() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function scrollToBottom() {
    const container = document.getElementById('chatMessages');
    container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// UI HELPERS
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

function logout() {
    localStorage.removeItem('cyama_auth');
    localStorage.removeItem('cyama_user');
    window.location.href = '/';
}

function renderSidebarFooter() {
    const footer = document.getElementById('sidebarFooter');
    if (isGuest) {
        footer.innerHTML = '<div class="user-info"><div class="user-avatar" style="background:#6d28d9;display:flex;align-items:center;justify-content:center"><i class="fas fa-user"></i></div><div class="user-name">Tamu</div><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-in-alt"></i></button></div>';
    } else {
        footer.innerHTML = `<div class="user-info"><img class="user-avatar" src="${userData.picture || 'https://ui-avatars.com/api/?background=8b5cf6&color=fff&name=' + encodeURIComponent(userData.name || 'User')}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="user-avatar" style="display:none;background:#6d28d9"><i class="fas fa-user"></i></div><div class="user-name">${escapeHtml(userData.name || 'User')}</div><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div>`;
    }
}

// INIT
function init() {
    renderSidebarFooter();
    loadChats();
    
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    sendButton.onclick = sendMessage;
    
    // Close sidebar on click outside (mobile)
    document.addEventListener('click', (e) => {
        const sidebar = document.getElementById('sidebar');
        if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
            if (!sidebar.contains(e.target) && !e.target.closest('.menu-toggle')) {
                sidebar.classList.remove('open');
            }
        }
    });
}

init();
</script>
</body>
</html>
