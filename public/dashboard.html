<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>cYama AI - Premium Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #0f0f1f;
            --sidebar-bg: rgba(10, 10, 26, 0.95);
            --bubble-user: linear-gradient(135deg, #8b5cf6, #6d28d9);
            --bubble-bot: rgba(255,255,255,0.06);
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --border-color: rgba(139,92,246,0.2);
            --accent: #8b5cf6;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }
        
        /* LOADING SCREEN - FIX LAYAR PUTIH */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0a0a1a, #12122a);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        
        .loading-screen.hide {
            opacity: 0;
            visibility: hidden;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(139,92,246,0.2);
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }
        
        /* Animated background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: orbFloat 25s infinite ease-in-out;
        }
        
        .orb-1 { width: 400px; height: 400px; background: #8b5cf6; top: -150px; left: -150px; opacity: 0.3; }
        .orb-2 { width: 350px; height: 350px; background: #ec4899; bottom: -100px; right: -100px; opacity: 0.25; animation-delay: -8s; }
        
        @keyframes orbFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(40px,-40px) scale(1.1); }
            66% { transform: translate(-30px,30px) scale(0.9); }
        }
        
        .app {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100%;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .app.visible {
            opacity: 1;
        }
        
        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(30px);
            z-index: 200;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }
        
        .sidebar.open { left: 0; }
        
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 150;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }
        
        /* MAIN CHAT */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        
        .chat-header {
            padding: 16px 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        
        .menu-btn {
            background: rgba(139,92,246,0.15);
            border: 1px solid var(--border-color);
            color: white;
            font-size: 22px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .menu-btn:active { background: rgba(139,92,246,0.4); transform: scale(0.95); }
        
        .chat-title-header {
            flex: 1;
            font-weight: 600;
            font-size: 18px;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeSlideUp 0.3s ease;
        }
        
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        
        .message-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #4c1d95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .message-bubble {
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }
        
        .message.user .message-bubble {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border-bottom-right-radius: 6px;
        }
        
        .message.bot .message-bubble {
            background: rgba(255,255,255,0.06);
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139,92,246,0.2);
        }
        
        /* INPUT AREA */
        .input-area {
            padding: 12px 16px 20px;
            background: rgba(10,10,26,0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .input-btn, .send-btn {
            width: 48px;
            height: 48px;
            background: rgba(139,92,246,0.15);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .input-btn:active, .send-btn:active { transform: scale(0.95); }
        
        .send-btn {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
        }
        
        .message-input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 14px 18px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            resize: none;
            min-height: 48px;
            max-height: 100px;
        }
        
        .message-input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(139,92,246,0.1);
        }
        
        .typing {
            display: flex;
            gap: 6px;
            padding: 12px 18px;
            background: rgba(255,255,255,0.06);
            border-radius: 24px;
            width: fit-content;
            border: 1px solid rgba(139,92,246,0.2);
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: typingAnim 1.4s infinite;
        }
        
        @keyframes typingAnim {
            0%,60%,100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-10px); opacity: 1; }
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: rgba(20,20,40,0.98);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            width: 90%;
            max-width: 420px;
            padding: 28px;
            border: 1px solid rgba(139,92,246,0.3);
            animation: modalPop 0.3s ease;
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
        }
        
        .modal-close {
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
        }
        
        .upload-area {
            border: 2px dashed rgba(139,92,246,0.5);
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .upload-area:hover { border-color: #8b5cf6; background: rgba(139,92,246,0.1); }
        .image-preview { max-width: 100%; border-radius: 20px; margin-top: 16px; }
        
        @media (min-width: 768px) {
            .sidebar { position: relative; left: 0 !important; }
            .menu-btn { display: none; }
            .sidebar-overlay { display: none !important; }
        }
        
        @media (max-width: 480px) {
            .message { max-width: 90%; }
            .input-btn, .send-btn { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>
    <!-- LOADING SCREEN - FIX LAYAR PUTIH -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div class="loading-text">Loading cYama AI...</div>
    </div>
    
    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    
    <div class="app" id="app">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header" style="padding:24px 20px;border-bottom:1px solid var(--border-color);">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
                    <div style="width:48px;height:48px;background:linear-gradient(135deg,#ffd89b,#c7e9fb);border-radius:20px;display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-brain" style="font-size:26px;color:#4c1d95;"></i>
                    </div>
                    <div><h2 style="font-size:20px;">cYama AI</h2><p style="font-size:11px;color:var(--text-secondary);">Premium Intelligence</p></div>
                </div>
                <button class="new-chat-btn" id="newChatBtn" style="width:100%;padding:14px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);border:none;border-radius:40px;color:white;font-weight:600;cursor:pointer;"><i class="fas fa-plus"></i> Obrolan Baru</button>
            </div>
            
            <div class="search-container" style="padding:12px 16px;margin:12px;background:rgba(255,255,255,0.05);border-radius:40px;display:flex;gap:10px;">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari chat..." style="background:none;border:none;color:white;width:100%;outline:none;">
            </div>
            
            <div class="chats-list" id="chatsList" style="flex:1;overflow-y:auto;padding:0 12px;"></div>
            
            <div class="sidebar-footer" id="sidebarFooter" style="padding:20px;border-top:1px solid var(--border-color);display:flex;align-items:center;gap:12px;"></div>
        </div>
        
        <div class="main-chat" id="mainChatArea">
            <div class="chat-header">
                <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
                <div class="chat-title-header" id="chatTitle">cYama AI</div>
                <div class="header-actions">
                    <button class="input-btn" id="settingsBtn" style="width:40px;height:40px;"><i class="fas fa-sliders-h"></i></button>
                </div>
            </div>
            
            <div class="messages" id="messages">
                <div style="text-align:center;padding:60px 20px;">
                    <div style="font-size:56px;margin-bottom:16px;">🤖</div>
                    <div style="font-size:20px;font-weight:600;margin-bottom:8px;">Selamat datang di cYama AI</div>
                    <div style="color:var(--text-secondary);">Asisten cerdas siap membantu Anda</div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-actions" style="display:flex;gap:8px;">
                        <button class="input-btn" id="uploadBtn"><i class="fas fa-image"></i></button>
                        <button class="input-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
                    </div>
                    <textarea class="message-input" id="messageInput" placeholder="Ketik pesan... (Enter untuk kirim)" rows="1"></textarea>
                    <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- MODAL SETTINGS -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header"><span>⚙️ Pengaturan</span><span class="modal-close" onclick="closeModal('settingsModal')">&times;</span></div>
            <div class="setting-item" style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border-color);">
                <span>🤖 AI Personality</span>
                <select id="personalitySelect" style="background:rgba(255,255,255,0.1);border:1px solid var(--border-color);padding:8px 14px;border-radius:30px;color:white;">
                    <option value="formal">Formal & Profesional</option>
                    <option value="santai">Santai & Ramah</option>
                    <option value="lucu">Lucu & Menghibur</option>
                </select>
            </div>
            <div class="setting-item" style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border-color);">
                <span>🌙 Dark Mode</span>
                <input type="checkbox" id="darkModeToggle">
            </div>
            <div class="setting-item" style="display:flex;justify-content:space-between;padding:14px 0;">
                <span>🗑️ Incognito Mode</span>
                <input type="checkbox" id="incognitoToggle">
            </div>
        </div>
    </div>
    
    <!-- MODAL UPLOAD -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header"><span>📷 Upload Gambar</span><span class="modal-close" onclick="closeModal('uploadModal')">&times;</span></div>
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt" style="font-size:48px;margin-bottom:12px;display:block;"></i>
                <p>Klik untuk pilih gambar</p>
                <input type="file" id="fileInput" accept="image/*" style="display:none;">
            </div>
            <div id="imagePreview"></div>
            <textarea id="imageQuestion" placeholder="Tanya tentang gambar ini... (opsional)" style="width:100%;padding:12px;border-radius:24px;background:rgba(255,255,255,0.08);border:none;color:white;margin:16px 0;"></textarea>
            <button class="new-chat-btn" id="processImageBtn" style="width:100%;padding:14px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);border:none;border-radius:40px;color:white;font-weight:600;cursor:pointer;">Kirim & Deskripsikan</button>
        </div>
    </div>
    
    <script>
        // ============ HIDE LOADING SCREEN ============
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                const app = document.getElementById('app');
                if(loadingScreen) loadingScreen.classList.add('hide');
                if(app) app.classList.add('visible');
            }, 500);
        });
        
        // ============ AUTH CHECK ============
        let auth = localStorage.getItem('cyama_auth');
        let user = JSON.parse(localStorage.getItem('cyama_user') || '{}');
        let isGuest = auth !== 'true';
        
        if (!auth && auth !== 'guest') window.location.href = '/';
        
        // ============ DOM ELEMENTS ============
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const menuBtn = document.getElementById('menuBtn');
        const mainChatArea = document.getElementById('mainChatArea');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatsList = document.getElementById('chatsList');
        const chatTitle = document.getElementById('chatTitle');
        
        // ============ SIDEBAR CONTROLS ============
        function closeSidebar() { sidebar.classList.remove('open'); if(overlay) overlay.classList.remove('active'); }
        function openSidebar() { sidebar.classList.add('open'); if(overlay) overlay.classList.add('active'); }
        function toggleSidebar() { if(sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); }
        
        if(menuBtn) menuBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleSidebar(); });
        if(mainChatArea) mainChatArea.addEventListener('click', () => { if(sidebar.classList.contains('open')) closeSidebar(); });
        if(overlay) overlay.addEventListener('click', closeSidebar);
        
        // ============ CHAT LOGIC ============
        let currentChatId = null;
        let chats = {};
        let incognito = false;
        let selectedImageBase64 = null;
        
        function escapeHtml(text) { let d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
        function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.closeModal = closeModal;
        
        function storageKey() { return isGuest ? 'cyama_chats_guest' : `cyama_chats_${user.email || 'user'}`; }
        function saveChats() { localStorage.setItem(storageKey(), JSON.stringify(chats)); }
        
        function loadChats() {
            let stored = localStorage.getItem(storageKey());
            if(stored) chats = JSON.parse(stored);
            else chats = {};
            if(Object.keys(chats).length === 0) createNewChat();
            else selectChat(Object.keys(chats)[0]);
            renderChatsList();
        }
        
        function createNewChat() {
            let id = Date.now().toString();
            chats[id] = { id, title: 'Chat Baru', messages: [], created: Date.now() };
            saveChats();
            renderChatsList();
            selectChat(id);
            return id;
        }
        
        function deleteChat(id, event) {
            if(event) event.stopPropagation();
            if(confirm('Hapus chat ini?')) {
                delete chats[id];
                saveChats();
                if(Object.keys(chats).length === 0) createNewChat();
                else selectChat(Object.keys(chats)[0]);
                renderChatsList();
            }
        }
        
        function selectChat(id) {
            currentChatId = id;
            let chat = chats[id];
            if(chat) {
                chatTitle.innerText = chat.title;
                renderMessages(chat.messages);
                renderChatsList();
            }
            closeSidebar();
        }
        
        function renderChatsList() {
            if(!chatsList) return;
            chatsList.innerHTML = '';
            let search = document.getElementById('searchInput')?.value.toLowerCase() || '';
            let filtered = Object.values(chats).filter(c => c.title.toLowerCase().includes(search));
            filtered.sort((a,b) => b.created - a.created);
            
            filtered.forEach(c => {
                let div = document.createElement('div');
                div.className = `chat-item ${currentChatId === c.id ? 'active' : ''}`;
                div.style.cssText = 'padding:14px 12px;margin:4px 0;border-radius:16px;display:flex;align-items:center;gap:12px;cursor:pointer;background:' + (currentChatId === c.id ? 'rgba(139,92,246,0.3)' : 'transparent');
                let preview = c.messages.length > 0 ? c.messages[c.messages.length-1].content.substring(0, 35) : 'Belum ada pesan';
                div.innerHTML = `
                    <div style="width:44px;height:44px;background:linear-gradient(135deg,#8b5cf6,#4c1d95);border-radius:14px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-comment"></i></div>
                    <div style="flex:1;"><div style="font-size:14px;font-weight:500;">${escapeHtml(c.title)}</div><div style="font-size:11px;color:var(--text-secondary);">${escapeHtml(preview)}</div></div>
                    <button onclick="deleteChat('${c.id}', event)" style="background:none;border:none;color:#ef4444;cursor:pointer;padding:6px;"><i class="fas fa-trash"></i></button>
                `;
                div.onclick = () => selectChat(c.id);
                chatsList.appendChild(div);
            });
        }
        
        function renderMessages(messages) {
            messagesDiv.innerHTML = '';
            if(!messages || messages.length === 0) {
                messagesDiv.innerHTML = `<div style="text-align:center;padding:60px 20px;"><div style="font-size:56px;margin-bottom:16px;">🤖</div><div style="font-size:20px;font-weight:600;">Halo!</div><div style="color:var(--text-secondary);">Saya cYama AI. Ada yang bisa saya bantu?</div></div>`;
                return;
            }
            messages.forEach((msg) => {
                let div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.innerHTML = `
                    <div class="message-avatar"><i class="fas ${msg.role === 'user' ? 'fa-user' : 'fa-robot'}"></i></div>
                    <div class="message-content"><div class="message-bubble">${escapeHtml(msg.content)}</div></div>
                `;
                messagesDiv.appendChild(div);
            });
            scrollToBottom();
        }
        
        function addMessage(role, content) {
            if(incognito) {
                let div = document.createElement('div');
                div.className = `message ${role}`;
                div.innerHTML = `<div class="message-avatar"><i class="fas ${role === 'user' ? 'fa-user' : 'fa-robot'}"></i></div><div class="message-content"><div class="message-bubble">${escapeHtml(content)}</div></div>`;
                messagesDiv.appendChild(div);
                scrollToBottom();
                return;
            }
            let chat = chats[currentChatId];
            if(!chat) return;
            chat.messages.push({ role, content });
            if(role === 'user' && chat.messages.length === 1) {
                chat.title = content.substring(0, 25);
                chatTitle.innerText = chat.title;
            }
            saveChats();
            renderMessages(chat.messages);
        }
        
        // ============ FIXED API CALL ============
        async function sendToAI(message, imageBase64 = null) {
            let personality = localStorage.getItem('cyama_personality') || 'formal';
            try {
                let body = { message, personality };
                if(imageBase64) body.image = imageBase64;
                
                const res = await fetch('/api/chat', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(body) 
                });
                
                // FIX: Cek response type
                const text = await res.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch(e) {
                    console.error('Response bukan JSON:', text.substring(0, 200));
                    return `⚠️ Server error: ${text.substring(0, 100)}`;
                }
                
                return data.success ? data.reply : `⚠️ ${data.error || 'Terjadi kesalahan'}`;
            } catch(e) { 
                console.error('API error:', e);
                return `⚠️ ${e.message}`; 
            }
        }
        
        let typingDiv = null;
        function showTyping() {
            typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            messagesDiv.appendChild(typingDiv);
            scrollToBottom();
        }
        function removeTyping() { if(typingDiv) typingDiv.remove(); }
        
        async function sendMessage() {
            let msg = messageInput.value.trim();
            if(!msg && !selectedImageBase64) return;
            messageInput.value = '';
            messageInput.style.height = 'auto';
            addMessage('user', msg || (selectedImageBase64 ? '[Mengirim gambar...]' : ''));
            showTyping();
            
            let reply;
            if(selectedImageBase64) {
                let question = document.getElementById('imageQuestion')?.value || 'Deskripsikan gambar ini dalam detail';
                reply = await sendToAI(question, selectedImageBase64);
                selectedImageBase64 = null;
                document.getElementById('imagePreview').innerHTML = '';
                closeModal('uploadModal');
                document.getElementById('imageQuestion').value = '';
            } else {
                reply = await sendToAI(msg);
            }
            removeTyping();
            addMessage('bot', reply);
        }
        
        // Voice
        let recognition = null;
        if('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'id-ID';
        }
        document.getElementById('voiceBtn').onclick = () => {
            if(recognition) {
                recognition.start();
                recognition.onresult = (e) => { messageInput.value = e.results[0][0].transcript; };
                recognition.onerror = () => alert('Mic tidak tersedia');
            } else alert('Voice tidak support');
        };
        
        // Upload - FIXED tanpa /api/upload, langsung kirim base64 ke /api/chat
        document.getElementById('uploadBtn').onclick = () => document.getElementById('uploadModal').style.display = 'flex';
        document.getElementById('uploadArea').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            let file = e.target.files[0];
            if(file && file.type.startsWith('image/')) {
                if(file.size > 5 * 1024 * 1024) {
                    alert('Ukuran gambar maksimal 5MB');
                    return;
                }
                let reader = new FileReader();
                reader.onload = (ev) => {
                    selectedImageBase64 = ev.target.result.split(',')[1];
                    document.getElementById('imagePreview').innerHTML = `<img src="${ev.target.result}" class="image-preview">`;
                };
                reader.readAsDataURL(file);
            }
        };
        document.getElementById('processImageBtn').onclick = () => sendMessage();
        
        // Settings
        document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'flex';
        document.getElementById('darkModeToggle').onchange = (e) => {
            if(e.target.checked) document.body.style.setProperty('--bg-primary', '#000000');
            else document.body.style.setProperty('--bg-primary', '#0a0a1a');
        };
        document.getElementById('personalitySelect').onchange = (e) => localStorage.setItem('cyama_personality', e.target.value);
        document.getElementById('incognitoToggle').onchange = (e) => incognito = e.target.checked;
        
        // Search
        document.getElementById('searchInput').oninput = () => renderChatsList();
        
        // Auto resize textarea
        messageInput.oninput = function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        };
        
        document.getElementById('newChatBtn').onclick = createNewChat;
        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        
        // Footer
        document.getElementById('sidebarFooter').innerHTML = isGuest ? `
            <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#4c1d95);display:flex;align-items:center;justify-content:center;"><i class="fas fa-user"></i></div>
            <div style="flex:1;font-size:14px;font-weight:500;">Tamu</div>
            <button onclick="localStorage.clear();location.reload()" style="background:none;border:none;color:white;font-size:20px;"><i class="fas fa-sign-out-alt"></i></button>
        ` : `
            <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#4c1d95);display:flex;align-items:center;justify-content:center;"><i class="fas fa-user"></i></div>
            <div style="flex:1;font-size:14px;font-weight:500;">${escapeHtml(user.name || 'User')}</div>
            <button onclick="localStorage.clear();location.reload()" style="background:none;border:none;color:white;font-size:20px;"><i class="fas fa-sign-out-alt"></i></button>
        `;
        
        loadChats();
        messageInput.focus();
        
        let savedPersonality = localStorage.getItem('cyama_personality');
        if(savedPersonality) document.getElementById('personalitySelect').value = savedPersonality;
    </script>
</body>
</html>
