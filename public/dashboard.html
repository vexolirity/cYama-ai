<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>cYama AI - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #0f0c29;
            --sidebar: rgba(0,0,0,0.6);
            --bubble-user: linear-gradient(135deg, #8b5cf6, #6d28d9);
            --bubble-bot: rgba(255,255,255,0.08);
            --text: white;
            --border: rgba(255,255,255,0.08);
        }
        
        body.dark { --bg: #0a0a0a; --sidebar: #0a0a0a; --bubble-bot: #1a1a1a; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s;
        }
        
        /* App Layout */
        .app { display: flex; height: 100%; position: relative; }
        
        /* Sidebar (Drawer HP) */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--sidebar);
            backdrop-filter: blur(20px);
            z-index: 100;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }
        .sidebar.open { left: 0; }
        
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .logo-small { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .logo-small i { font-size: 28px; color: #8b5cf6; }
        .logo-small span { font-weight: 700; font-size: 18px; }
        
        .new-chat-btn {
            width: 100%; padding: 12px;
            background: #8b5cf6; border: none;
            border-radius: 30px; color: white;
            font-weight: 600; display: flex;
            align-items: center; justify-content: center;
            gap: 8px; cursor: pointer;
        }
        
        .search-box { padding: 12px 16px; background: rgba(255,255,255,0.05); margin: 12px; border-radius: 30px; display: flex; gap: 8px; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; }
        
        .folders { padding: 0 12px; margin-bottom: 12px; display: flex; gap: 8px; overflow-x: auto; }
        .folder-btn { padding: 6px 14px; background: rgba(255,255,255,0.05); border-radius: 20px; font-size: 12px; white-space: nowrap; }
        .folder-btn.active { background: #8b5cf6; }
        
        .chats-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .chat-item {
            padding: 14px; margin: 4px 0; border-radius: 16px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; transition: 0.2s;
        }
        .chat-item.active { background: rgba(139,92,246,0.3); }
        .chat-item .title { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pin-icon { color: #f59e0b; font-size: 12px; margin-right: 4px; }
        .delete-chat { opacity: 0; transition: 0.2s; background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; padding: 6px; }
        .chat-item:hover .delete-chat { opacity: 1; }
        
        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #8b5cf6; display: flex; align-items: center; justify-content: center; }
        .user-name { flex: 1; font-size: 14px; }
        .logout-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        /* Main Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; width: 100%; }
        
        .chat-header {
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .chat-title { flex: 1; font-weight: 600; font-size: 16px; }
        .header-actions { display: flex; gap: 12px; }
        .icon-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 6px; }
        
        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #8b5cf6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
        .message.user .avatar { background: #4c1d95; }
        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }
        .message.user .bubble { background: linear-gradient(135deg, #8b5cf6, #6d28d9); border-bottom-right-radius: 4px; }
        .message.bot .bubble { background: var(--bubble-bot); border-bottom-left-radius: 4px; }
        
        .message-actions { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
        .msg-action { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 12px; cursor: pointer; }
        
        .time { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; padding: 0 4px; }
        
        /* Input Area */
        .input-area {
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-actions { display: flex; gap: 8px; }
        .input-btn {
            width: 44px; height: 44px;
            background: rgba(139,92,246,0.2);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        textarea {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            max-height: 100px;
        }
        textarea:focus { outline: none; border-color: #8b5cf6; }
        .send-btn {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: rgba(0,0,0,0.95);
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 18px; font-weight: 600; }
        .modal-close { font-size: 24px; cursor: pointer; }
        
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .setting-item select, .setting-item input { background: rgba(255,255,255,0.1); border: none; padding: 8px 12px; border-radius: 20px; color: white; }
        
        .quick-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-top: 12px; }
        .quick-btn { background: rgba(139,92,246,0.2); padding: 10px; border-radius: 20px; text-align: center; cursor: pointer; font-size: 13px; }
        
        .reminder-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 16px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-top: 16px; }
        .stat-card { background: rgba(139,92,246,0.15); padding: 16px; border-radius: 20px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 700; color: #8b5cf6; }
        
        .upload-area { border: 2px dashed rgba(139,92,246,0.5); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; margin: 16px 0; }
        .image-preview { max-width: 100%; max-height: 150px; border-radius: 16px; margin-top: 10px; }
        
        .typing { display: flex; gap: 4px; padding: 12px 16px; background: var(--bubble-bot); border-radius: 20px; width: fit-content; }
        .typing span { width: 8px; height: 8px; background: white; border-radius: 50%; animation: typing 1.4s infinite; }
        @keyframes typing { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-8px); opacity: 1; } }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (min-width: 768px) {
            .sidebar { position: relative; left: 0 !important; width: 300px; }
            .menu-btn { display: none; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-small"><i class="fas fa-brain"></i><span>cYama AI</span></div>
            <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i> Obrolan Baru</button>
        </div>
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Cari chat..."></div>
        <div class="folders" id="foldersContainer"></div>
        <div class="chats-list" id="chatsList"></div>
        <div class="sidebar-footer" id="sidebarFooter"></div>
    </div>
    
    <!-- Main Chat -->
    <div class="main-chat">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
            <div class="chat-title" id="chatTitle">cYama AI</div>
            <div class="header-actions">
                <button class="icon-btn" id="settingsBtn"><i class="fas fa-sliders-h"></i></button>
                <button class="icon-btn" id="moreBtn"><i class="fas fa-ellipsis-v"></i></button>
            </div>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-actions">
                    <button class="input-btn" id="uploadBtn"><i class="fas fa-image"></i></button>
                    <button class="input-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
                </div>
                <textarea id="messageInput" placeholder="Ketik pesan... (Enter kirim)" rows="1"></textarea>
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Settings -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <div class="modal-header"><span>⚙️ Pengaturan</span><span class="modal-close" onclick="closeModal('settingsModal')">&times;</span></div>
        <div class="setting-item"><span>🤖 Personality</span><select id="personality"><option value="formal">Formal</option><option value="santai">Santai</option><option value="lucu">Lucu</option></select></div>
        <div class="setting-item"><span>🌙 Dark Mode</span><input type="checkbox" id="darkModeToggle"></div>
        <div class="setting-item"><span>🎨 Background</span><input type="color" id="bgColor" value="#0f0c29"></div>
        <div class="setting-item"><span>📁 Folder</span><select id="folderSelect"><option value="all">Semua</option><option value="work">Work</option><option value="personal">Personal</option></select></div>
        <div class="setting-item"><span>🗑️ Incognito</span><input type="checkbox" id="incognitoToggle"></div>
        <div><button class="new-chat-btn" id="exportChatBtn" style="margin-top:16px;">📥 Export Chat</button></div>
    </div>
    <div style="margin-top:20px;"><h4>⚡ Quick Reply</h4><div class="quick-grid" id="quickGrid"></div></div>
    <div style="margin-top:20px;"><h4>⏰ Reminder</h4><input type="text" id="reminderText" placeholder="Apa yang ingin diingatkan?" style="width:100%; padding:10px; border-radius:20px; background:rgba(255,255,255,0.1); border:none; color:white;"><button class="new-chat-btn" id="addReminderBtn" style="margin-top:8px;">Tambah Reminder</button><div id="reminderList"></div></div>
    <div style="margin-top:20px;"><h4>📊 Statistik</h4><div class="stats-grid" id="statsContainer"></div></div>
</div>

<!-- Upload Modal -->
<div class="modal" id="uploadModal">
    <div class="modal-content">
        <div class="modal-header"><span>📷 Upload Gambar</span><span class="modal-close" onclick="closeModal('uploadModal')">&times;</span></div>
        <div class="upload-area" id="uploadArea"><i class="fas fa-cloud-upload-alt"></i><p>Klik untuk pilih gambar</p><input type="file" id="fileInput" accept="image/*" style="display:none;"></div>
        <div id="imagePreview"></div>
        <textarea id="imageQuestion" placeholder="Tanya tentang gambar ini..." style="width:100%; padding:12px; border-radius:20px; background:rgba(255,255,255,0.1); border:none; color:white; margin:12px 0;"></textarea>
        <button class="new-chat-btn" id="processImageBtn">Kirim & Deskripsikan</button>
    </div>
</div>

<!-- More Menu Modal -->
<div class="modal" id="moreModal">
    <div class="modal-content">
        <div class="modal-header"><span>📋 Menu</span><span class="modal-close" onclick="closeModal('moreModal')">&times;</span></div>
        <button class="new-chat-btn" id="shareChatBtn" style="margin-bottom:10px;"><i class="fab fa-whatsapp"></i> Bagikan Chat</button>
        <button class="new-chat-btn" id="statsBtn" style="margin-bottom:10px; background:#10b981;"><i class="fas fa-chart-line"></i> Lihat Statistik</button>
        <button class="new-chat-btn" id="clearAllBtn" style="background:#ef4444;"><i class="fas fa-trash"></i> Hapus Semua Chat</button>
    </div>
</div>

<script>
    // ============ INIT ============
    let auth = localStorage.getItem('cyama_auth');
    let user = JSON.parse(localStorage.getItem('cyama_user') || '{}');
    let isGuest = auth !== 'true';
    if (!auth && auth !== 'guest') window.location.href = '/';
    
    let currentChatId = null;
    let chats = {};
    let folders = { work: [], personal: [], all: [] };
    let reminders = JSON.parse(localStorage.getItem('cyama_reminders') || '[]');
    let streak = parseInt(localStorage.getItem('cyama_streak') || '0');
    let lastChatDate = localStorage.getItem('cyama_last_chat');
    let incognito = false;
    let selectedImage = null;
    
    // DOM
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatsList = document.getElementById('chatsList');
    const chatTitle = document.getElementById('chatTitle');
    
    // Helper
    function escapeHtml(text) { let d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
    function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
    
    function storageKey() { return isGuest ? 'cyama_chats_guest' : `cyama_chats_${user.email || 'user'}`; }
    function saveChats() { localStorage.setItem(storageKey(), JSON.stringify(chats)); }
    
    function updateStreak() {
        let today = new Date().toDateString();
        if (lastChatDate !== today) {
            if (lastChatDate) streak = (new Date() - new Date(lastChatDate)) / (1000*3600*24) === 1 ? streak + 1 : 1;
            else streak = 1;
            localStorage.setItem('cyama_streak', streak);
            localStorage.setItem('cyama_last_chat', today);
        }
    }
    
    // Chat Management
    function loadChats() {
        let stored = localStorage.getItem(storageKey());
        if (stored) chats = JSON.parse(stored);
        else chats = {};
        if (Object.keys(chats).length === 0) createNewChat();
        else selectChat(Object.keys(chats)[0]);
        renderChatsList();
    }
    
    function createNewChat() {
        if (isGuest && Object.keys(chats).length >= 3) { alert('Tamu maksimal 3 chat. Login untuk unlimited.'); return null; }
        let id = Date.now().toString();
        let folder = document.getElementById('folderSelect')?.value || 'all';
        chats[id] = { id, title: 'Chat Baru', messages: [], folder: folder === 'all' ? 'personal' : folder, pinned: false, created: Date.now() };
        saveChats(); renderChatsList(); selectChat(id);
        return id;
    }
    
    function deleteChat(id) { delete chats[id]; saveChats(); if (Object.keys(chats).length === 0) createNewChat(); else selectChat(Object.keys(chats)[0]); renderChatsList(); }
    function pinChat(id) { chats[id].pinned = !chats[id].pinned; saveChats(); renderChatsList(); }
    function updateChatTitle(id, msg) { let title = msg.substring(0, 25) + (msg.length > 25 ? '...' : ''); chats[id].title = title; saveChats(); renderChatsList(); if (currentChatId === id) chatTitle.innerText = title; }
    
    function selectChat(id) {
        currentChatId = id; let chat = chats[id];
        if (chat) { chatTitle.innerText = chat.title; renderMessages(chat.messages); renderChatsList(); }
    }
    
    function renderChatsList() {
        let container = chatsList; container.innerHTML = '';
        let search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let folder = document.getElementById('folderSelect')?.value || 'all';
        let filtered = Object.values(chats).filter(c => (folder === 'all' || c.folder === folder) && c.title.toLowerCase().includes(search));
        filtered.sort((a,b) => (b.pinned - a.pinned) || (b.created - a.created));
        filtered.forEach(c => { let div = document.createElement('div'); div.className = `chat-item ${currentChatId === c.id ? 'active' : ''}`;
            div.innerHTML = `${c.pinned ? '<i class="fas fa-thumbtack pin-icon"></i>' : ''}<div class="title">${escapeHtml(c.title)}</div><button class="delete-chat" onclick="event.stopPropagation();deleteChat('${c.id}')"><i class="fas fa-trash"></i></button><button class="delete-chat" onclick="event.stopPropagation();pinChat('${c.id}')"><i class="fas fa-thumbtack"></i></button>`;
            div.onclick = () => selectChat(c.id); container.appendChild(div); });
    }
    
    function renderMessages(messages) {
        messagesDiv.innerHTML = '';
        if (!messages || messages.length === 0) { messagesDiv.innerHTML = '<div class="message bot"><div class="avatar"><i class="fas fa-robot"></i></div><div class="bubble">Halo! Saya cYama AI. Ada yang bisa saya bantu? 😊</div></div>'; return; }
        messages.forEach((msg, idx) => { let div = document.createElement('div'); div.className = `message ${msg.role}`;
            div.innerHTML = `<div class="avatar"><i class="fas ${msg.role === 'user' ? 'fa-user' : 'fa-robot'}"></i></div><div><div class="bubble">${escapeHtml(msg.content)}</div><div class="message-actions"><button class="msg-action" onclick="copyText('${escapeHtml(msg.content).replace(/'/g, "\\'")}')"><i class="fas fa-copy"></i> Salin</button><button class="msg-action" onclick="speakText('${escapeHtml(msg.content).replace(/'/g, "\\'")}')"><i class="fas fa-volume-up"></i> Suara</button></div><div class="time">${msg.time || ''}</div></div>`;
            messagesDiv.appendChild(div); });
        scrollToBottom();
    }
    
    function addMessage(role, content) {
        if (incognito) { messagesDiv.innerHTML += `<div class="message ${role}"><div class="avatar"><i class="fas ${role === 'user' ? 'fa-user' : 'fa-robot'}"></i></div><div><div class="bubble">${escapeHtml(content)}</div></div></div>`; scrollToBottom(); return; }
        let chat = chats[currentChatId]; if (!chat) return;
        let msg = { role, content, time: new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' }) };
        chat.messages.push(msg);
        if (role === 'user' && chat.messages.length === 1) updateChatTitle(currentChatId, content);
        saveChats(); renderMessages(chat.messages);
        if (role === 'user') updateStreak();
    }
    
    // API
    async function sendToAI(message, imageBase64 = null) {
        let personality = localStorage.getItem('cyama_personality') || 'formal';
        try {
            let body = { message, personality };
            if (imageBase64) body.image = imageBase64;
            let res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            let data = await res.json();
            return data.success ? data.reply : `⚠️ ${data.error || 'Error'}`;
        } catch(e) { return `⚠️ ${e.message}`; }
    }
    
    async function sendMessage() {
        let msg = messageInput.value.trim();
        if (!msg && !selectedImage) return;
        let draft = msg; messageInput.value = ''; messageInput.style.height = 'auto';
        addMessage('user', msg || (selectedImage ? '[Mengirim gambar]' : ''));
        
        showTyping();
        let reply;
        if (selectedImage) {
            reply = await sendToAI(document.getElementById('imageQuestion').value || 'Deskripsikan gambar ini', selectedImage);
            selectedImage = null; document.getElementById('imagePreview').innerHTML = ''; closeModal('uploadModal');
        } else {
            reply = await sendToAI(msg);
        }
        removeTyping();
        addMessage('bot', reply);
    }
    
    // Voice
    let recognition = null;
    if ('webkitSpeechRecognition' in window) { recognition = new webkitSpeechRecognition(); recognition.lang = 'id-ID'; }
    document.getElementById('voiceBtn').onclick = () => { if (recognition) { recognition.start(); recognition.onresult = (e) => { messageInput.value = e.results[0][0].transcript; }; } else alert('Voice tidak support'); };
    
    function speakText(text) { let utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'id-ID'; window.speechSynthesis.speak(utterance); }
    window.speakText = speakText;
    window.copyText = (text) => { navigator.clipboard.writeText(text); alert('Disalin!'); };
    
    // Upload Image
    document.getElementById('uploadBtn').onclick = () => document.getElementById('uploadModal').style.display = 'flex';
    document.getElementById('uploadArea').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => { let file = e.target.files[0]; if (file) { let reader = new FileReader(); reader.onload = (ev) => { selectedImage = ev.target.result.split(',')[1]; document.getElementById('imagePreview').innerHTML = `<img src="${ev.target.result}" class="image-preview">`; }; reader.readAsDataURL(file); } };
    document.getElementById('processImageBtn').onclick = () => sendMessage();
    
    // UI
    let typingDiv = null;
    function showTyping() { typingDiv = document.createElement('div'); typingDiv.className = 'typing'; typingDiv.innerHTML = '<span></span><span></span><span></span>'; messagesDiv.appendChild(typingDiv); scrollToBottom(); }
    function removeTyping() { if (typingDiv) typingDiv.remove(); }
    
    // Folders
    function renderFolders() { let container = document.getElementById('foldersContainer'); container.innerHTML = '<button class="folder-btn active" data-folder="all">Semua</button><button class="folder-btn" data-folder="work">Work</button><button class="folder-btn" data-folder="personal">Personal</button>'; document.querySelectorAll('.folder-btn').forEach(btn => btn.onclick = () => { document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderChatsList(); }); }
    
    // Quick Reply
    let quickReplies = ['Terima kasih!', 'Bisa jelaskan lebih detail?', 'Tolong ringkas.', 'Contoh?', 'Lanjutkan.', 'Saya setuju.'];
    function renderQuickGrid() { let grid = document.getElementById('quickGrid'); if(!grid) return; grid.innerHTML = ''; quickReplies.forEach(q => { let btn = document.createElement('div'); btn.className = 'quick-btn'; btn.innerText = q; btn.onclick = () => { messageInput.value = q; sendMessage(); closeModal('settingsModal'); }; grid.appendChild(btn); }); }
    
    // Reminders
    function renderReminders() { let container = document.getElementById('reminderList'); if(!container) return; container.innerHTML = ''; reminders.forEach((r, i) => { container.innerHTML += `<div class="reminder-item"><span>🔔 ${escapeHtml(r.text)}</span><button onclick="deleteReminder(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;">Hapus</button></div>`; }); }
    function deleteReminder(i) { reminders.splice(i,1); localStorage.setItem('cyama_reminders', JSON.stringify(reminders)); renderReminders(); }
    document.getElementById('addReminderBtn')?.addEventListener('click', () => { let text = document.getElementById('reminderText')?.value; if(text) { reminders.push({ text, time: Date.now() }); localStorage.setItem('cyama_reminders', JSON.stringify(reminders)); renderReminders(); document.getElementById('reminderText').value = ''; } });
    
    // Stats
    function renderStats() { let totalChats = Object.keys(chats).length; let totalMessages = Object.values(chats).reduce((sum,c) => sum + c.messages.length, 0); document.getElementById('statsContainer').innerHTML = `<div class="stat-card"><div class="stat-number">${totalChats}</div><div>Chat</div></div><div class="stat-card"><div class="stat-number">${totalMessages}</div><div>Pesan</div></div><div class="stat-card"><div class="stat-number">${streak}</div><div>Streak</div></div><div class="stat-card"><div class="stat-number">${reminders.length}</div><div>Reminder</div></div>`; }
    
    // Share & Export
    document.getElementById('shareChatBtn')?.addEventListener('click', () => { let text = encodeURIComponent(`Chat dari cYama AI: ${chats[currentChatId]?.title || ''}`); window.open(`https://wa.me/?text=${text}`, '_blank'); });
    document.getElementById('exportChatBtn')?.addEventListener('click', () => { let chat = chats[currentChatId]; if(!chat) return; let content = `cYama AI Export\n${new Date().toLocaleString()}\n\n` + chat.messages.map(m => `${m.role === 'user' ? 'User' : 'cYama AI'} (${m.time}):\n${m.content}\n`).join('\n'); let blob = new Blob([content], {type:'text/plain'}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `chat_${currentChatId}.txt`; a.click(); });
    document.getElementById('clearAllBtn')?.addEventListener('click', () => { if(confirm('Hapus SEMUA chat? Tidak bisa dibatalkan!')) { chats = {}; saveChats(); createNewChat(); renderChatsList(); } });
    document.getElementById('statsBtn')?.addEventListener('click', () => { renderStats(); document.getElementById('settingsModal').style.display = 'flex'; });
    
    // Settings & Dark Mode
    document.getElementById('settingsBtn').onclick = () => { renderQuickGrid(); renderReminders(); renderStats(); document.getElementById('settingsModal').style.display = 'flex'; };
    document.getElementById('darkModeToggle').onchange = (e) => { if(e.target.checked) document.body.classList.add('dark'); else document.body.classList.remove('dark'); };
    document.getElementById('bgColor').onchange = (e) => document.body.style.background = e.target.value;
    document.getElementById('personality').onchange = (e) => localStorage.setItem('cyama_personality', e.target.value);
    document.getElementById('incognitoToggle').onchange = (e) => incognito = e.target.checked;
    document.getElementById('folderSelect').onchange = () => renderChatsList();
    document.getElementById('moreBtn').onclick = () => document.getElementById('moreModal').style.display = 'flex';
    
    // Search
    document.getElementById('searchInput').oninput = () => renderChatsList();
    
    // Initial Load
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    window.closeModal = closeModal;
    
    document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('newChatBtn').onclick = createNewChat;
    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    messageInput.oninput = function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; };
    
    // Footer
    document.getElementById('sidebarFooter').innerHTML = isGuest ? `<div class="user-avatar"><i class="fas fa-user"></i></div><div class="user-name">Tamu</div><button class="logout-btn" onclick="localStorage.clear();location.reload()"><i class="fas fa-sign-out-alt"></i></button>` : `<img src="${user.picture || ''}" class="user-avatar" style="object-fit:cover;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="user-avatar" style="display:none"><i class="fas fa-user"></i></div><div class="user-name">${escapeHtml(user.name || 'User')}</div><button class="logout-btn" onclick="localStorage.clear();location.reload()"><i class="fas fa-sign-out-alt"></i></button>`;
    
    renderFolders(); loadChats(); messageInput.focus();
</script>
</body>
</html>
